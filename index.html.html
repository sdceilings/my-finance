<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<title>Ledger — Personal Finance Control</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap');

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin:0; padding:0; }
html,body { background:#EDEAE2; }

.pfc {
  --ink:#16201D; --canvas:#FBFAF7; --surface:#FFFFFF; --line:#E8E4DA;
  --line-soft:#F0EDE5; --muted:#6B7370; --pine:#1F6F5C; --pine-soft:#E5F0EC;
  --clay:#BF5A39; --clay-soft:#F7E9E2; --gold:#B08A2E;
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  color:var(--ink); background:var(--canvas);
  max-width:480px; margin:0 auto; min-height:100vh;
  position:relative; overflow-x:hidden;
}
.num { font-family:'Space Grotesk',-apple-system,sans-serif; font-variant-numeric:tabular-nums; }
.pfc h1,.pfc h2,.pfc h3 { font-weight:600; }
.pfc button { font-family:inherit; cursor:pointer; border:none; background:none; color:inherit; }
svg.ic { stroke:currentColor; stroke-width:1.9; fill:none; stroke-linecap:round; stroke-linejoin:round; display:block; }

.scroll { padding: 0 18px calc(112px + env(safe-area-inset-bottom)); }
.topbar { position:sticky; top:0; z-index:20; background:rgba(251,250,247,0.86); backdrop-filter:saturate(180%) blur(14px);
  padding: calc(env(safe-area-inset-top) + 14px) 18px 12px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--line-soft); }
.topbar .title { font-family:'Space Grotesk'; font-size:21px; font-weight:600; letter-spacing:-0.02em; }
.topbar .sub { font-size:12px; color:var(--muted); margin-top:1px; }
.iconbtn { width:38px; height:38px; border-radius:12px; display:flex; align-items:center; justify-content:center; position:relative; color:var(--ink); }
.iconbtn:active { background:var(--line-soft); }
.badge { position:absolute; top:3px; right:3px; min-width:16px; height:16px; padding:0 4px; border-radius:8px; background:var(--clay); color:#fff; font-size:10px; font-weight:700; display:flex; align-items:center; justify-content:center; }

.hero { padding:26px 4px 22px; }
.hero .eyebrow { font-size:12px; letter-spacing:0.14em; text-transform:uppercase; color:var(--muted); }
.hero .bal { font-family:'Space Grotesk'; font-size:46px; font-weight:600; letter-spacing:-0.03em; line-height:1.05; margin-top:6px; }
.hero .ruled { height:1px; background:repeating-linear-gradient(90deg,var(--line) 0 6px, transparent 6px 12px); margin:18px 0 0; }

.kpis { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.kpi { background:var(--surface); border:1px solid var(--line); border-radius:16px; padding:14px; }
.kpi .lab { font-size:11.5px; color:var(--muted); display:flex; align-items:center; gap:5px; }
.kpi .val { font-family:'Space Grotesk'; font-size:20px; font-weight:600; margin-top:7px; letter-spacing:-0.02em; }

.sec-head { display:flex; align-items:center; justify-content:space-between; margin:26px 4px 12px; }
.sec-head h2 { font-size:15px; font-weight:600; }
.link { font-size:13px; color:var(--pine); font-weight:500; display:inline-flex; align-items:center; gap:2px; }

.card { background:var(--surface); border:1px solid var(--line); border-radius:16px; overflow:hidden; }
.row { display:flex; align-items:center; gap:12px; padding:13px 15px; border-bottom:1px solid var(--line-soft); }
.row:last-child { border-bottom:none; }
.dot { width:38px; height:38px; border-radius:11px; display:flex; align-items:center; justify-content:center; font-size:17px; flex-shrink:0; }
.row .mid { flex:1; min-width:0; }
.row .mid .t { font-size:14.5px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.row .mid .s { font-size:12px; color:var(--muted); margin-top:1px; }
.row .amt { font-family:'Space Grotesk'; font-weight:600; font-size:15px; white-space:nowrap; }
.amt.in { color:var(--pine); } .amt.out { color:var(--ink); }

.empty { text-align:center; color:var(--muted); padding:34px 20px; font-size:13.5px; }
.empty .big { font-size:30px; margin-bottom:8px; }

.bbar { height:8px; border-radius:6px; background:var(--line-soft); overflow:hidden; margin-top:9px; }
.bbar > i { display:block; height:100%; border-radius:6px; transition:width .5s ease; }
.bmeta { display:flex; justify-content:space-between; font-size:12px; color:var(--muted); margin-top:7px; }

.chips { display:flex; gap:8px; overflow-x:auto; padding:2px 0 4px; }
.chips::-webkit-scrollbar { display:none; }
.chip { padding:8px 14px; border-radius:999px; border:1px solid var(--line); font-size:13px; white-space:nowrap; background:var(--surface); color:var(--muted); font-weight:500; }
.chip.on { background:var(--ink); color:#fff; border-color:var(--ink); }

.nav { position:fixed; left:0; right:0; bottom:0; z-index:30; max-width:480px; margin:0 auto;
  background:rgba(255,255,255,0.93); backdrop-filter:blur(16px) saturate(180%); border-top:1px solid var(--line);
  display:flex; align-items:center; justify-content:space-around; padding:8px 8px calc(8px + env(safe-area-inset-bottom)); }
.nav button { display:flex; flex-direction:column; align-items:center; gap:3px; padding:6px 10px; color:var(--muted); font-size:10.5px; font-weight:500; border-radius:12px; }
.nav button.on { color:var(--pine); }
.nav .add { background:var(--pine); color:#fff; width:50px; height:50px; border-radius:16px; align-items:center; justify-content:center; margin-top:-20px; box-shadow:0 8px 18px rgba(31,111,92,0.34); }

.overlay { position:fixed; inset:0; z-index:50; background:rgba(20,28,25,0.42); display:flex; align-items:flex-end; justify-content:center; }
.sheet { width:100%; max-width:480px; background:var(--canvas); border-radius:24px 24px 0 0; padding:8px 18px calc(24px + env(safe-area-inset-bottom)); max-height:92vh; overflow-y:auto; animation:rise .26s cubic-bezier(.2,.8,.2,1); }
@keyframes rise { from{transform:translateY(100%);} to{transform:translateY(0);} }
.sheet.no-anim { animation:none; }
.grab { width:40px; height:4px; border-radius:3px; background:var(--line); margin:8px auto 14px; }
.sheet h2 { font-family:'Space Grotesk'; font-size:19px; }

.field { margin-top:16px; }
.field > label { display:block; font-size:12.5px; color:var(--muted); margin-bottom:7px; font-weight:500; }
.input, .select { width:100%; padding:14px; border-radius:14px; border:1px solid var(--line); background:var(--surface); font-size:16px; font-family:inherit; color:var(--ink); }
.input:focus,.select:focus { outline:2px solid var(--pine); outline-offset:-1px; }
.amount-input { font-family:'Space Grotesk'; font-size:30px; font-weight:600; text-align:center; letter-spacing:-0.02em; padding:18px; }
.toggle { display:flex; background:var(--line-soft); border-radius:14px; padding:4px; gap:4px; }
.toggle button { flex:1; padding:11px; border-radius:11px; font-size:14px; font-weight:600; color:var(--muted); }
.toggle button.in { background:var(--pine); color:#fff; }
.toggle button.out { background:var(--clay); color:#fff; }

.catgrid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
.catcell { display:flex; flex-direction:column; align-items:center; gap:5px; padding:10px 4px; border-radius:14px; border:1px solid var(--line); background:var(--surface); font-size:11px; color:var(--muted); text-align:center; }
.catcell .em { font-size:20px; }
.catcell.on { border-color:var(--pine); background:var(--pine-soft); color:var(--ink); font-weight:600; }

.btn { width:100%; padding:16px; border-radius:15px; background:var(--ink); color:#fff; font-weight:600; font-size:15.5px; margin-top:22px; display:flex; align-items:center; justify-content:center; gap:7px; }
.btn:active { opacity:.85; }
.btn.danger { background:var(--clay); }
.btn.ghost { background:var(--surface); border:1px solid var(--line); color:var(--ink); }
.btn.dim { opacity:.4; }

.alert { display:flex; gap:11px; align-items:flex-start; padding:14px; border-radius:14px; background:var(--clay-soft); border:1px solid #E8C9BB; margin-bottom:10px; }
.alert.warn { background:#FBF3DF; border-color:#EAD9A8; }
.alert .at { font-size:13.5px; font-weight:600; }
.alert .as { font-size:12.5px; color:var(--muted); margin-top:2px; }

.lockwrap { min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px; }
.dots { display:flex; gap:14px; margin:26px 0; }
.dots i { width:14px; height:14px; border-radius:50%; border:1.5px solid var(--ink); }
.dots i.f { background:var(--ink); }
.dots.err i { border-color:var(--clay); } .dots.err i.f { background:var(--clay); }
.keypad { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; width:100%; max-width:280px; }
.key { aspect-ratio:1.6; border-radius:16px; background:var(--surface); border:1px solid var(--line); font-family:'Space Grotesk'; font-size:24px; font-weight:500; display:flex; align-items:center; justify-content:center; }
.key:active { background:var(--line-soft); }

.calcdisp { background:var(--ink); color:#fff; border-radius:18px; padding:20px 18px; text-align:right; margin-top:8px; }
.calcdisp .e { font-size:13px; color:rgba(255,255,255,.5); min-height:17px; font-family:'Space Grotesk'; }
.calcdisp .d { font-size:40px; font-weight:600; font-family:'Space Grotesk'; letter-spacing:-0.02em; line-height:1.1; word-break:break-all; }
.calcgrid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-top:14px; }
.ckey { aspect-ratio:1.3; border-radius:16px; background:var(--surface); border:1px solid var(--line); font-family:'Space Grotesk'; font-size:23px; font-weight:500; display:flex; align-items:center; justify-content:center; }
.ckey:active { transform:scale(.96); }
.ckey.op { background:var(--pine-soft); color:var(--pine); border-color:transparent; }
.ckey.eq { background:var(--pine); color:#fff; border-color:transparent; }
.ckey.fn { background:var(--line-soft); color:var(--muted); border-color:transparent; }

.fab { position:fixed; right:16px; bottom:calc(88px + env(safe-area-inset-bottom)); z-index:29; width:54px; height:54px; border-radius:17px; background:var(--ink); color:#fff; display:flex; align-items:center; justify-content:center; box-shadow:0 10px 22px rgba(20,28,25,.30); }
@media (min-width:481px){ .fab { right:calc(50% - 224px); } }
.fab .badge { top:-3px; right:-3px; }
.attprev { display:flex; align-items:center; gap:10px; padding:8px 10px; border:1px solid var(--line); border-radius:12px; background:var(--surface); margin-top:10px; }
.todocheck { width:24px; height:24px; border-radius:50%; border:2px solid var(--line); flex-shrink:0; display:flex; align-items:center; justify-content:center; color:#fff; }
.todocheck.done { background:var(--pine); border-color:var(--pine); }
.done-text { text-decoration:line-through; color:var(--muted); }
.alarmbanner { position:fixed; top:calc(env(safe-area-inset-top) + 10px); left:50%; transform:translateX(-50%); width:calc(100% - 28px); max-width:452px; z-index:60; background:var(--ink); color:#fff; border-radius:16px; padding:13px 14px; box-shadow:0 12px 30px rgba(0,0,0,.32); display:flex; align-items:center; gap:12px; animation:rise .25s ease; }
.alarmdismiss { background:rgba(255,255,255,.16); color:#fff; border-radius:10px; padding:9px 14px; font-size:13px; font-weight:600; flex-shrink:0; }
.chatwrap { display:flex; flex-direction:column; gap:8px; max-height:54vh; min-height:160px; overflow-y:auto; padding:8px 2px; }
.bub { max-width:80%; padding:9px 12px; border-radius:15px; font-size:14px; line-height:1.35; word-break:break-word; }
.bub.me { align-self:flex-end; background:var(--pine); color:#fff; border-bottom-right-radius:5px; }
.bub.them { align-self:flex-start; background:var(--surface); border:1px solid var(--line); border-bottom-left-radius:5px; }
.bub .tm { font-size:9.5px; opacity:.6; margin-top:3px; }
.chatbar { display:flex; gap:8px; margin-top:12px; }
.autherr { background:var(--clay-soft); border:1px solid #E8C9BB; color:var(--clay); font-size:12.5px; padding:11px 13px; border-radius:12px; margin-top:14px; }
.rolepill { font-size:9.5px; font-weight:700; letter-spacing:.06em; color:var(--pine); background:var(--pine-soft); padding:2px 6px; border-radius:6px; vertical-align:middle; margin-left:6px; }

.seg { display:flex; justify-content:space-between; padding:14px 15px; border-bottom:1px solid var(--line-soft); align-items:center; width:100%; }
.seg:last-child { border-bottom:none; }
.seg .sl { font-size:14.5px; } .seg .sv { font-size:14px; color:var(--muted); display:flex; align-items:center; gap:6px; }

.legend { display:flex; justify-content:center; gap:20px; font-size:12px; color:var(--muted); padding:6px 0 2px; }
.legend i { width:9px; height:9px; border-radius:3px; display:inline-block; margin-right:6px; }
.fade { animation:fade .3s ease; }
@keyframes fade { from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }
@media (prefers-reduced-motion: reduce){ *{animation:none !important;} }
</style>
</head>

<div class="pfc" id="app"></div>

<script>
/* ============================================================ */
/* Constants                                                     */
/* ============================================================ */
var STORAGE_KEY = "pfc-data-v1";
var CURRENCIES = [
  {code:"AED",sym:"AED ",label:"UAE Dirham"},
  {code:"USD",sym:"$",label:"US Dollar"},
  {code:"EUR",sym:"\u20AC",label:"Euro"},
  {code:"GBP",sym:"\u00A3",label:"British Pound"},
  {code:"INR",sym:"\u20B9",label:"Indian Rupee"},

  {code:"PKR",sym:"Rs ",label:"Pakistani Rupee"}
];
var CAT_META = {
  Salary:{icon:"\uD83D\uDCBC",color:"#1F6F5C"}, Business:{icon:"\uD83C\uDFEA",color:"#2E7D6B"},
  Investment:{icon:"\uD83D\uDCC8",color:"#3C8E7A"}, Gift:{icon:"\uD83C\uDF81",color:"#4FA08A"},

  EMI:{icon:"\uD83D\uDCB3",color:"#7A5C9E"},
  Investments:{icon:"\uD83D\uDCC8",color:"#1F6F5C"},

};
var INV_TYPES=["Gold","SIP","Stocks","Bonds","Fixed Deposit","Crypto","Other"];
var INV_META={
  Gold:{icon:"\uD83E\uDE99",color:"#B08A2E"},
  SIP:{icon:"\uD83D\uDCC8",color:"#1F6F5C"},
  Stocks:{icon:"\uD83D\uDCCA",color:"#3A5A8C"},
  Bonds:{icon:"\uD83C\uDFDB\uFE0F",color:"#5B7A6B"},

  Crypto:{icon:"\u20BF",color:"#C77B4A"},
  Other:{icon:"\uD83D\uDCB0",color:"#6B7370"}
};
function invMeta(t){ return INV_META[t]||INV_META.Other; }
function DEFAULT_DATA(){ return {
  profile:{name:""}, settings:{currency:"AED",pin:""},
  categories:{ income:["Salary","Business","Investment","Gift","Other"],
    expense:["Food","Transport","Rent","Utilities","Shopping","Health","Entertainment","Education","EMI","Investments","Other"] },
  transactions:[], budgets:{}, reminders:[], cards:[], emis:[], investments:[], todos:[]
};}

/* icons (inline SVG) */
var ICON = {
  home:'<path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/>',
  list:'<line x1="8" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="20" y2="12"/><line x1="8" y1="18" x2="20" y2="18"/><circle cx="4" cy="6" r="1"/><circle cx="4" cy="12" r="1"/><circle cx="4" cy="18" r="1"/>',
  wallet:'<rect x="3" y="6" width="18" height="13" rx="2"/><path d="M16 12h3"/>',
  pie:'<path d="M21 12A9 9 0 1 1 12 3v9z"/>',
  plus:'<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>',
  bell:'<path d="M6 9a6 6 0 1 1 12 0c0 5 2 6 2 6H4s2-1 2-6"/><path d="M10 20a2 2 0 0 0 4 0"/>',
  gear:'<circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M5 5l2 2M17 17l2 2M19 5l-2 2M7 17l-2 2"/>',
  search:'<circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/>',
  x:'<line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/>',
  trash:'<path d="M4 7h16M9 7V5h6v2M6 7l1 13h10l1-13"/>',
  check:'<path d="M5 12l5 5L20 6"/>',
  chevron:'<path d="M9 6l6 6-6 6"/>',
  lock:'<rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/>',
  alert:'<path d="M12 3 2 20h20z"/><line x1="12" y1="10" x2="12" y2="14"/><circle cx="12" cy="17" r="0.6"/>',
  download:'<path d="M12 4v10M8 11l4 4 4-4M5 19h14"/>',

  logout:'<path d="M14 4h4a1 1 0 0 1 1 1v14a1 1 0 0 1-1 1h-4"/><path d="M10 16l-4-4 4-4"/><line x1="6" y1="12" x2="16" y2="12"/>',
  clip:'<path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>'

function ic(name,size,color){ size=size||22; var s=color?(' style="color:'+color+'"'):''; return '<svg class="ic" width="'+size+'" height="'+size+'" viewBox="0 0 24 24"'+s+'>'+ICON[name]+'</svg>'; }

/* ============================================================ */
/* Storage (localStorage with in-memory fallback)               */
/* ============================================================ */
var _mem = {};
var store = {
  get:function(k){ try{ return window.localStorage.getItem(k); }catch(e){ return (k in _mem)?_mem[k]:null; } },
  set:function(k,v){ try{ window.localStorage.setItem(k,v); }catch(e){ _mem[k]=v; } }
};

/* ============================================================ */
/* State                                                         */
/* ============================================================ */
/* ============================================================ */
/* Multi-user database + auth                                    */
/* ============================================================ */
var APP_KEY = "pfc-app-v1";
var db = { users:[], currentId:null, finances:{}, messages:[], reads:{} };
var data = DEFAULT_DATA();   // reference to the signed-in user's finances

var ui = {
  unlocked:false, tab:"home", sheet:null,
  tx:{}, reminder:{}, budgetForm:{}, inv:{}, todo:{}, wealthSeg:"cards",
  calc:{display:"0",acc:null,op:null,fresh:true,target:null},
  search:"", fType:"all", fCat:"all", fMonth:"all",
  catType:"expense", newCat:"", pinEntry:"", pinErr:false,
  onboard:{name:"",currency:"AED"},
  auth:{ mode:"login", name:"", phone:"", pass:"", pass2:"", currency:"AED", err:"" },
  adminUser:null, chatUser:null, chatText:"", chatAttach:null, migrateLegacy:false, _legacy:null, newUser:{}

function normPhone(p){ return String(p||"").replace(/[^0-9+]/g,""); }

/* currency-aware formatting for admin views */
function symOf(code){ for(var i=0;i<CURRENCIES.length;i++){ if(CURRENCIES[i].code===code) return CURRENCIES[i].sym; } return ""; }
function fmtC(n,code){ return symOf(code)+Number(n||0).toLocaleString(undefined,{minimumFractionDigits:0,maximumFractionDigits:2}); }
/* compute a user's headline metrics without disturbing the signed-in user */
function computeForUser(id){
  var prev=data; data=db.finances[id]||DEFAULT_DATA(); migrateUserData(data); reconcileAuto();
  var mk=nowMonth(), agg=monthAgg(mk), bal=totalBalance();
  var invVal=0; data.investments.forEach(function(v){ invVal+=invValue(v); });
  var debt=0; data.cards.forEach(function(c){ debt+=Number(c.balance)||0; });
  var monthlyEmi=0; data.emis.forEach(function(e){ if(emiActive(e)) monthlyEmi+=Number(e.monthly)||0; });
  var res={ income:agg.income, expense:agg.expense, balance:bal, invVal:invVal, debt:debt, monthlyEmi:monthlyEmi, net:bal+invVal-debt, txCount:data.transactions.length, byCat:agg.byCat, code:(data.settings&&data.settings.currency)||"AED" };
  data=prev; return res;

/* ============================================================ */
/* Helpers                                                       */
/* ============================================================ */
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function todayISO(){ return new Date().toISOString().slice(0,10); }
function monthKey(iso){ return (iso||"").slice(0,7); }
function nowMonth(){ return todayISO().slice(0,7); }
function meta(c){ return CAT_META[c] || {icon:"\u2022",color:"#6B7370"}; }
function cur(){ for(var i=0;i<CURRENCIES.length;i++){ if(CURRENCIES[i].code===data.settings.currency) return CURRENCIES[i]; } return CURRENCIES[0]; }
function fmt(n){ return cur().sym + Number(n||0).toLocaleString(undefined,{minimumFractionDigits:0,maximumFractionDigits:2}); }
function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function monthLabel(k){ var a=k.split("-"); var d=new Date(+a[0],+a[1]-1,1); return d.toLocaleDateString(undefined,{month:"short",year:"numeric"}); }
function lastNMonths(n){ var out=[],d=new Date(); for(var i=n-1;i>=0;i--){ var dd=new Date(d.getFullYear(),d.getMonth()-i,1); out.push(dd.getFullYear()+"-"+String(dd.getMonth()+1).padStart(2,"0")); } return out; }
function monthAgg(mk){ var income=0,expense=0,byCat={}; data.transactions.forEach(function(t){ if(monthKey(t.date)!==mk) return; if(t.type==="income") income+=+t.amount; else { expense+=+t.amount; byCat[t.category]=(byCat[t.category]||0)+ +t.amount; } }); return {income:income,expense:expense,byCat:byCat}; }
function totalBalance(){ return data.transactions.reduce(function(s,t){ return s + (t.type==="income"? +t.amount : -t.amount); },0); }

/* Forecast: average total expense of the most recent completed months */
function projectedNextExpense(){
  var cm=nowMonth(), bm={};
  data.transactions.forEach(function(t){ if(t.type==="expense"){ var mk=monthKey(t.date); if(mk<cm) bm[mk]=(bm[mk]||0)+ +t.amount; } });
  var keys=Object.keys(bm).sort();
  if(!keys.length) return { amount: monthAgg(cm).expense, basis:0 };
  var last=keys.slice(-3), sum=last.reduce(function(s,k){return s+bm[k];},0);
  return { amount: sum/last.length, basis:last.length };
}
/* Calculator math */
function calcFmt(n){ if(!isFinite(n)) n=0; return String(Math.round(n*1e8)/1e8); }
function calcCompute(a,b,op){ var r=0; if(op==="+")r=a+b; else if(op==="-")r=a-b; else if(op==="*")r=a*b; else if(op==="/")r=(b===0?0:a/b); return calcFmt(r); }
function calcOpSym(o){ return o==="/"?"\u00F7":o==="*"?"\u00D7":o==="-"?"\u2212":o==="+"?"+":""; }
function calcRefresh(){ var c=ui.calc, e=document.getElementById("calc-e"), d=document.getElementById("calc-d");
  if(e) e.textContent=(c.acc!=null&&c.op)?(calcFmt(c.acc)+" "+calcOpSym(c.op)):"";
  if(d) d.textContent=c.display;
}
function computeAlerts(){
  var out=[], mk=nowMonth(), agg=monthAgg(mk);
  for(var cat in data.budgets){ var lim=data.budgets[cat], sp=agg.byCat[cat]||0;
    if(sp>lim) out.push({kind:"over",cat:cat,msg:cat+" over budget by "+fmt(sp-lim)});
    else if(sp>=lim*0.85) out.push({kind:"near",cat:cat,msg:cat+" at "+Math.round(sp/lim*100)+"% of budget"}); }
  var today=todayISO();
  data.reminders.forEach(function(r){ if(r.due<today) out.push({kind:"overdue",reminder:r,msg:r.title+" was due "+r.due});
    else { var days=Math.round((new Date(r.due)-new Date(today))/86400000); if(days<=5) out.push({kind:"due",reminder:r,msg:r.title+" due in "+days+"d ("+fmt(r.amount)+")"}); } });
  (data.todos||[]).forEach(function(td){ if(td.done||!td.due) return;
    if(td.due<today) out.push({kind:"todoOver",todo:td,msg:td.title+" \u2014 task overdue"});
    else { var d2=Math.round((new Date(td.due)-new Date(today))/86400000); if(d2<=3) out.push({kind:"todoDue",todo:td,msg:td.title+" \u2014 due in "+d2+"d"}); } });
  return out;
}

/* ---- Credit cards & EMIs ---- */
function addMonths(mk,n){ var a=mk.split("-"); var d=new Date(+a[0],(+a[1]-1)+n,1); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0"); }
function clampDay(mk,day){ var a=mk.split("-"); var last=new Date(+a[0],+a[1],0).getDate(); var dd=Math.min(Math.max(1,day||1),last); return mk+"-"+String(dd).padStart(2,"0"); }
function emiInstallments(e){ return Math.max(1, parseInt(e.tenure,10)||1); }
function emiPaidCount(e){ var n=emiInstallments(e), cm=nowMonth(), c=0; for(var i=0;i<n;i++){ if(addMonths(e.start,i)<=cm) c++; } return c; }
function emiActive(e){ return emiPaidCount(e) < emiInstallments(e); }

/* Materialize one expense per installment for every month that has arrived.
   This is what makes each month's EMI flow into Expenses automatically. */
function reconcileEMIs(){
  if(!data.emis) data.emis=[];
  var valid={}; data.emis.forEach(function(e){ valid[e.id]=e; });
  // drop auto-expenses whose EMI was deleted
  data.transactions = data.transactions.filter(function(t){ return !t.emiId || valid[t.emiId]; });
  var existing={}; data.transactions.forEach(function(t){ if(t.emiId) existing[t.emiId+"#"+t.inst]=t; });
  var cm=nowMonth();
  data.emis.forEach(function(e){
    var n=emiInstallments(e), monthly=Number(e.monthly)||0;
    for(var i=0;i<n;i++){
      var mk=addMonths(e.start,i);
      if(mk>cm) continue;                 // future installments post when their month arrives
      var key=e.id+"#"+(i+1), note=e.desc+" (EMI "+(i+1)+"/"+n+")", date=clampDay(mk,e.day);
      if(existing[key]){ var t=existing[key]; t.amount=monthly; t.note=note; t.date=date; t.category="EMI"; }
      else data.transactions.push({ id:uid(), type:"expense", category:"EMI", amount:monthly, date:date, note:note, emiId:e.id, inst:(i+1) });
    }
  });
  data.transactions.sort(function(a,b){ return b.date.localeCompare(a.date); });
}

/* ---- Investments / Portfolio ---- */
function sipMonthsDue(inv){ var cm=nowMonth(), n=inv.tenure?parseInt(inv.tenure,10):100000, c=0; for(var i=0;i<n;i++){ if(addMonths(inv.start,i)<=cm) c++; else break; } return c; }
function invInvested(inv){ if(inv.type==="SIP") return (Number(inv.invested0)||0)+(Number(inv.monthly)||0)*sipMonthsDue(inv); return Number(inv.invested)||0; }
function invValue(inv){ var v=Number(inv.value); if(inv.value===""||inv.value==null||isNaN(v)) return invInvested(inv); return v; }
function sipActive(inv){ if(inv.type!=="SIP") return false; if(!inv.tenure) return true; return sipMonthsDue(inv)<parseInt(inv.tenure,10); }

/* SIP monthly contributions post to cash as expenses (category "Investments"), unless cash===false */
function reconcileSIPs(){
  if(!data.investments) data.investments=[];
  var valid={}; data.investments.forEach(function(inv){ if(inv.type==="SIP" && inv.cash!==false) valid[inv.id]=inv; });
  data.transactions = data.transactions.filter(function(t){ return !t.sipId || valid[t.sipId]; });
  var existing={}; data.transactions.forEach(function(t){ if(t.sipId) existing[t.sipId+"#"+t.inst]=t; });
  for(var id in valid){ var inv=valid[id], due=sipMonthsDue(inv), monthly=Number(inv.monthly)||0;
    for(var i=0;i<due;i++){ var mk=addMonths(inv.start,i), key=inv.id+"#"+(i+1), note=inv.name+" (SIP "+(i+1)+")", date=clampDay(mk,inv.day);
      if(existing[key]){ var t=existing[key]; t.amount=monthly; t.note=note; t.date=date; t.category="Investments"; }
      else data.transactions.push({ id:uid(), type:"expense", category:"Investments", amount:monthly, date:date, note:note, sipId:inv.id, inst:(i+1) });
    } }
  data.transactions.sort(function(a,b){ return b.date.localeCompare(a.date); });
}
function reconcileAuto(){ reconcileEMIs(); reconcileSIPs(); }

function filteredTx(){
  var q=ui.search.toLowerCase();
  return data.transactions.filter(function(t){
    if(ui.fType!=="all" && t.type!==ui.fType) return false;
    if(ui.fCat!=="all" && t.category!==ui.fCat) return false;
    if(ui.fMonth!=="all" && monthKey(t.date)!==ui.fMonth) return false;
    if(q && ((t.note||"")+t.category).toLowerCase().indexOf(q)<0) return false;
    return true;
  });
}
function activityResults(){
  var f=filteredTx();

function barChart(series){
  var W=320,H=200,pad=24, n=series.length, max=1;
  series.forEach(function(s){ max=Math.max(max,s.income,s.expense); });
  var gw=(W-pad*2)/n, bw=gw*0.30, gap=gw*0.10;
  var bars="", labels="";
  series.forEach(function(s,i){
    var x=pad+i*gw+gap;
    var ih=(s.income/max)*(H-pad-22), eh=(s.expense/max)*(H-pad-22);
    bars += '<rect x="'+x+'" y="'+(H-22-ih)+'" width="'+bw+'" height="'+ih+'" rx="3" fill="#1F6F5C"/>';
    bars += '<rect x="'+(x+bw+2)+'" y="'+(H-22-eh)+'" width="'+bw+'" height="'+eh+'" rx="3" fill="#BF5A39"/>';
    labels += '<text x="'+(x+bw+1)+'" y="'+(H-6)+'" font-size="11" fill="#6B7370" text-anchor="middle" font-family="Inter">'+s.m+'</text>';
  });
  return '<svg viewBox="0 0 '+W+' '+H+'" width="100%" height="200">'+bars+labels+'</svg>';
}
function lineChart(series){
  var W=320,H=170,pad=20, n=series.length;
  var vals=series.map(function(s){return s.net;});
  var max=Math.max.apply(null,vals.concat([1])), min=Math.min.apply(null,vals.concat([0]));
  if(max===min) max=min+1;
  var sx=(W-pad*2)/(Math.max(1,n-1));
  function y(v){ return pad + (1-(v-min)/(max-min))*(H-pad*2-16); }
  var pts=series.map(function(s,i){ return (pad+i*sx)+","+y(s.net); });
  var zeroY=y(0);
  var dots="",labels="";
  series.forEach(function(s,i){ var x=pad+i*sx; dots+='<circle cx="'+x+'" cy="'+y(s.net)+'" r="3" fill="#16201D"/>'; labels+='<text x="'+x+'" y="'+(H-4)+'" font-size="11" fill="#6B7370" text-anchor="middle" font-family="Inter">'+s.m+'</text>'; });
  return '<svg viewBox="0 0 '+W+' '+H+'" width="100%" height="170">'
    +'<line x1="'+pad+'" y1="'+zeroY+'" x2="'+(W-pad)+'" y2="'+zeroY+'" stroke="#E8E4DA" stroke-dasharray="4 4"/>'
    +'<polyline points="'+pts.join(" ")+'" fill="none" stroke="#16201D" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round"/>'
    +dots+labels+'</svg>';
}
function donut(pie){
  var total=pie.reduce(function(s,e){return s+e.value;},0)||1;
  var r=42, c=2*Math.PI*r, off=0, segs="";
  pie.forEach(function(e){ var frac=e.value/total, len=frac*c;
    segs+='<circle cx="60" cy="60" r="'+r+'" fill="none" stroke="'+meta(e.name).color+'" stroke-width="16" stroke-dasharray="'+len+' '+(c-len)+'" stroke-dashoffset="'+(-off)+'" transform="rotate(-90 60 60)"/>';
    off+=len; });
  return '<svg viewBox="0 0 120 120" width="100%" height="150">'+segs+'</svg>';
}

var actions = {

  openTx:function(){ ui.tx={type:"expense",amount:"",category:"",date:todayISO(),note:""}; ui.sheet="tx"; render(); },

    if(t.emiId){ var e=data.emis.filter(function(x){return x.id===t.emiId;})[0]; if(e){ actions.editEmi(e.id); return; } }
    if(t.sipId){ var v=data.investments.filter(function(x){return x.id===t.sipId;})[0]; if(v){ ui.wealthSeg="invest"; actions.editInvest(v.id); return; } }
    ui.tx=Object.assign({},t,{amount:String(t.amount)}); ui.sheet="tx"; render(); },
  txType:function(a){ ui.tx.type=a; render(); },
  txCat:function(a){ ui.tx.category=a; render(); },
  saveTx:function(){ var t=ui.tx; if(!(Number(t.amount)>0 && t.category)) return;
    var rec={id:t.id||uid(),type:t.type,amount:Number(t.amount),category:t.category,date:t.date||todayISO(),note:(t.note||"").trim()};
    if(t.id){ data.transactions=data.transactions.map(function(x){return x.id===t.id?rec:x;}); }

  invType:function(t){ ui.inv.type=t; render(); },
  invCash:function(a){ ui.inv.cash = (a==="1"); render(); },
  saveInvest:function(){ var v=ui.inv, sip=(v.type==="SIP");
    if(!(v.name&&v.name.trim())) return;
    if(sip ? !(Number(v.monthly)>0 && v.start) : !(Number(v.invested)>0 || Number(v.value)>0)) return;

    if(sip){ rec.monthly=Number(v.monthly)||0; rec.tenure=parseInt(v.tenure,10)||""; rec.start=v.start; rec.day=parseInt(v.day,10)||1; rec.cash=v.cash!==false; rec.invested0=Number(v.invested0)||0; }
    else { rec.invested=Number(v.invested)||0; }
    if(v.id) data.investments=data.investments.map(function(x){return x.id===v.id?rec:x;}); else data.investments.push(rec);
    ui.sheet=null; reconcileAuto(); commit(); },
  deleteInvest:function(){ var id=ui.inv.id; data.investments=data.investments.filter(function(x){return x.id!==id;}); ui.sheet=null; reconcileAuto(); commit(); },

  calc:function(){ ui.calc={display:"0",acc:null,op:null,fresh:true,target:null}; ui.sheet="calc"; render(); },
  calcForTx:function(){ var a=(ui.tx&&ui.tx.amount)?String(ui.tx.amount):"0"; ui.calc={display:(a&&a!=="")?a:"0",acc:null,op:null,fresh:true,target:"tx"}; ui.sheet="calc"; render(); },
  calcDigit:function(d){ var c=ui.calc; if(c.fresh||c.display==="0"){ c.display=d; c.fresh=false; } else if(c.display.replace(/[^0-9]/g,"").length<12){ c.display+=d; } calcRefresh(); },
  calcDot:function(){ var c=ui.calc; if(c.fresh){ c.display="0."; c.fresh=false; } else if(c.display.indexOf(".")<0){ c.display+="."; } calcRefresh(); },
  calcOp:function(o){ var c=ui.calc; if(c.op!=null && !c.fresh){ c.display=calcCompute(c.acc,parseFloat(c.display)||0,c.op); c.acc=parseFloat(c.display); } else { c.acc=parseFloat(c.display)||0; } c.op=o; c.fresh=true; calcRefresh(); },
  calcEquals:function(){ var c=ui.calc; if(c.op!=null && c.acc!=null){ c.display=calcCompute(c.acc,parseFloat(c.display)||0,c.op); c.acc=null; c.op=null; c.fresh=true; } calcRefresh(); },
  calcClear:function(){ ui.calc.display="0"; ui.calc.acc=null; ui.calc.op=null; ui.calc.fresh=true; calcRefresh(); },
  calcBack:function(){ var c=ui.calc; if(c.fresh) return; c.display=c.display.length>1?c.display.slice(0,-1):"0"; if(c.display===""||c.display==="-") c.display="0"; calcRefresh(); },
  calcPct:function(){ var c=ui.calc; var v=parseFloat(c.display)||0; v=(c.acc!=null&&c.op)? (c.acc*v/100) : (v/100); c.display=calcFmt(v); c.fresh=true; calcRefresh(); },
  calcNeg:function(){ var c=ui.calc; if(c.display!=="0") c.display=(c.display.charAt(0)==="-")?c.display.slice(1):("-"+c.display); calcRefresh(); },
  calcUse:function(){ var v=parseFloat(ui.calc.display); ui.tx.amount=isNaN(v)?"":String(v); ui.sheet="tx"; render(); },
  calcCopy:function(){ try{ navigator.clipboard.writeText(ui.calc.display); }catch(e){} },

  fType:function(a){ ui.fType=a; render(); },

  fMonth:function(a){ ui.fMonth=a; render(); },

  closeSheetBg:function(){ if(ui.sheet==="calc" && ui.calc.target==="tx"){ ui.sheet="tx"; render(); return; } ui.sheet=null; render(); },

  catType:function(a){ ui.catType=a; render(); },

  delCat:function(c){ data.categories[ui.catType]=data.categories[ui.catType].filter(function(x){return x!==c;}); commit(); },

  setPin:function(){ var p=prompt("Set a 4-digit PIN (leave blank to remove lock):", data.settings.pin||""); if(p===null) return; if(p===""||/^\d{4}$/.test(p)){ data.settings.pin=p; commit(); } else alert("PIN must be exactly 4 digits."); },
  pinKey:function(n){ if(ui.pinEntry.length>=4) return; ui.pinEntry+=String(n);
    if(ui.pinEntry.length===4){ if(ui.pinEntry===data.settings.pin){ ui.unlocked=true; ui.pinEntry=""; render(); } else { ui.pinErr=true; render(); setTimeout(function(){ ui.pinEntry=""; ui.pinErr=false; render(); },500); return; } }
    render(); },
  pinDel:function(){ ui.pinEntry=ui.pinEntry.slice(0,-1); render(); },

  finishOnboard:function(){ var o=ui.onboard; if(!(o.name&&o.name.trim())) return; data.profile.name=o.name.trim(); data.settings.currency=o.currency; commit(); },

  exportCSV:function(){ var rows=[["Date","Type","Category","Amount","Note"]];
    data.transactions.slice().sort(function(a,b){return a.date.localeCompare(b.date);}).forEach(function(t){ rows.push([t.date,t.type,t.category,t.amount,String(t.note||"").replace(/,/g,";")]); });
    download(rows.map(function(r){return r.join(",");}).join("\n"),"ledger-transactions.csv","text/csv"); },
  exportJSON:function(){ download(JSON.stringify(data,null,2),"ledger-backup.json","application/json"); },
  importJSON:function(){ document.getElementById("importFile").click(); },
  reset:function(){ if(confirm("Erase ALL of YOUR financial data? This cannot be undone.")){ var u=curUser(); var nd=DEFAULT_DATA(); nd.profile.name=(u?u.name:data.profile.name); nd.settings.currency=data.settings.currency; setData(nd); ui.sheet=null; commit(); } },

  /* ---- auth ---- */
  authMode:function(m){ ui.auth.mode=m; ui.auth.err=""; render(); },
  doRegister:function(){ var a=ui.auth, first=(db.users.length===0);
    if(!a.name||!a.name.trim()){ a.err="Please enter your name."; render(); return; }
    var phone=normPhone(a.phone);
    if(phone.length<4){ a.err="Please enter a valid contact number."; render(); return; }
    if(db.users.some(function(u){return u.phone===phone;})){ a.err="That contact number already has an account."; render(); return; }
    if(!a.pass || a.pass.length<4){ a.err="Password must be at least 4 characters."; render(); return; }
    if(a.pass!==a.pass2){ a.err="Passwords do not match."; render(); return; }
    var id=uid();
    var u={ id:id, name:a.name.trim(), phone:phone, passHash:hashPass(a.pass), role:first?"admin":"user", createdAt:Date.now() };
    db.users.push(u);
    var fin;
    if(first && ui.migrateLegacy && ui._legacy){ fin=ui._legacy; if(!fin.profile) fin.profile={}; fin.profile.name=a.name.trim(); }
    else { fin=DEFAULT_DATA(); fin.profile.name=a.name.trim(); }
    if(!fin.settings) fin.settings={}; fin.settings.currency=a.currency; if(fin.settings.pin==null) fin.settings.pin="";
    db.finances[id]=fin;
    ui.migrateLegacy=false; ui._legacy=null;
    loadUser(id); ui.unlocked=true; ui.tab="home"; ui.auth={mode:"login",name:"",phone:"",pass:"",pass2:"",currency:"AED",err:""};
    commit(); },
  doLogin:function(){ var a=ui.auth, phone=normPhone(a.phone);
    var u=db.users.filter(function(x){return x.phone===phone && x.passHash===hashPass(a.pass);})[0];
    if(!u){ a.err="Wrong contact number or password."; render(); return; }
    loadUser(u.id); ui.unlocked=false; ui.tab="home"; ui.auth={mode:"login",name:"",phone:"",pass:"",pass2:"",currency:"AED",err:""};
    commit(); },
  logout:function(){ db.currentId=null; data=DEFAULT_DATA(); ui.unlocked=false; ui.tab="home"; ui.sheet=null; ui.adminUser=null; ui.chatUser=null; save(); render(); },

  /* ---- admin ---- */
  adminReports:function(){ if(!isAdmin()) return; ui.tab="adminReports"; ui.sheet=null; render(); },
  adminUsers:function(){ if(!isAdmin()) return; ui.tab="adminUsers"; ui.sheet=null; render(); },
  adminOpenUser:function(id){ if(!isAdmin()) return; ui.adminUser=id; ui.tab="adminUserDetail"; render(); },
  adminToggleRole:function(id){ if(!isAdmin()||id===db.currentId) return; var u=userById(id); if(u){ u.role=(u.role==="admin"?"user":"admin"); commit(); } },
  adminResetPass:function(id){ if(!isAdmin()) return; var u=userById(id); if(!u) return; var p=prompt("New password for "+u.name+" (min 4 chars):",""); if(p===null) return; if(p.length<4){ alert("Password must be at least 4 characters."); return; } u.passHash=hashPass(p); commit(); alert("Password updated."); },
  adminDeleteUser:function(id){ if(!isAdmin()||id===db.currentId) return; var u=userById(id); if(!u) return; if(!confirm("Delete "+u.name+" and all their data? This cannot be undone.")) return; db.users=db.users.filter(function(x){return x.id!==id;}); delete db.finances[id]; db.messages=db.messages.filter(function(m){return m.userId!==id;}); commit(); },
  adminAddUser:function(){ if(!isAdmin()) return; ui.newUser={name:"",phone:""}; ui.sheet="adduser"; render(); },
  adminSaveUser:function(){ if(!isAdmin()) return; var n=ui.newUser||{}, phone=normPhone(n.phone);
    if(!n.name||!n.name.trim()){ alert("Please enter the user's name."); return; }
    if(phone.length<4){ alert("Please enter a valid contact number."); return; }
    if(db.users.some(function(u){return u.phone===phone;})){ alert("That contact number already has an account."); return; }
    var id=uid();
    db.users.push({ id:id, name:n.name.trim(), phone:phone, passHash:hashPass("0000"), role:"user", createdAt:Date.now() });
    var fin=DEFAULT_DATA(); fin.profile.name=n.name.trim(); fin.settings.currency=(data.settings&&data.settings.currency)||"AED"; db.finances[id]=fin;
    ui.sheet=null; commit(); alert(n.name.trim()+" added.\nContact: "+phone+"\nPassword: 0000"); },
  changePass:function(){ var u=curUser(); if(!u) return; var p=prompt("Set a new password (min 4 characters):",""); if(p===null) return; if(p.length<4){ alert("Password must be at least 4 characters."); return; } u.passHash=hashPass(p); commit(); alert("Password changed."); },

  /* ---- chat ---- */
  openChat:function(){ if(isAdmin()){ ui.chatUser=null; } else { ui.chatUser=db.currentId; markRead(db.currentId); } ui.chatText=""; ui.chatAttach=null; ui.sheet="chat"; render(); scrollChatBottom(); },
  chatPick:function(id){ ui.chatUser=id; markRead(id); render(); scrollChatBottom(); },
  chatBack:function(){ ui.chatUser=null; render(); },
  chatAttachPick:function(){ var el=document.getElementById("chatFile"); if(el) el.click(); },
  chatAttachClear:function(){ ui.chatAttach=null; render(); },
  chatSend:function(){ var txt=(ui.chatText||"").trim(), att=ui.chatAttach; if(!txt && !att) return; var who=isAdmin()?ui.chatUser:db.currentId; if(!who) return;
    var msg={ id:uid(), userId:who, from:isAdmin()?"admin":"user", text:txt, ts:Date.now() };
    if(att) msg.att=att;
    db.messages.push(msg); ui.chatText=""; ui.chatAttach=null; markRead(who); render(); scrollChatBottom(); }
};

function scrollChatBottom(){ setTimeout(function(){ var c=document.getElementById("chatscroll"); if(c) c.scrollTop=c.scrollHeight; },30); }
function setField(path,val,num){
  if(num) val=val.replace(/[^0-9.]/g,"");
  var parts=path.split(".");
  if(parts.length===1){
    if(path==="search") ui.search=val;
    else if(path==="newCat") ui.newCat=val;
    else if(path==="chatText") ui.chatText=val;
    else if(path==="profileName"){ data.profile.name=val; var u=curUser(); if(u) u.name=val; save(); }
    else if(path==="currency"){ data.settings.currency=val; save(); }
    else ui[path]=val;
  } else {
    var obj=ui[parts[0]]; if(!obj){ obj=ui[parts[0]]={}; } obj[parts[1]]=val;
  }
}

/* event delegation */
app.addEventListener("click", function(e){
  var el=e.target.closest("[data-act]"); if(!el) return;
  if(el.dataset.act==="closeSheetBg" && e.target.closest("[data-stop]")) return;
  var fn=actions[el.dataset.act]; if(fn) fn(el.dataset.arg);
});
function onInput(e){
  var el=e.target.closest("[data-field]"); if(!el) return;
  setField(el.dataset.field, el.value, el.dataset.num);
  if(el.dataset.live==="search"){ var box=document.getElementById("results"); if(box) box.innerHTML=activityResults(); }
  // live-update budget total + amount color without losing focus: only re-render structural views, skip here
}
app.addEventListener("input", onInput);
app.addEventListener("change", function(e){
  var el=e.target.closest("[data-field]"); if(!el) return;
  if(el.tagName==="SELECT"){ setField(el.dataset.field, el.value, el.dataset.num); }
});
app.addEventListener("change", function(e){
  if(e.target && e.target.id==="importFile"){ var f=e.target.files[0]; if(!f) return;
    var r=new FileReader(); r.onload=function(){ try{ var p=JSON.parse(r.result); if(!p.transactions) throw 0; var nd=Object.assign(DEFAULT_DATA(),p); nd.settings=Object.assign({currency:"AED",pin:""},p.settings||{}); if(!nd.cards)nd.cards=[]; if(!nd.emis)nd.emis=[]; if(!nd.investments)nd.investments=[]; var ex=nd.categories.expense, oi=ex.indexOf("Other"); if(ex.indexOf("EMI")<0){ if(oi>=0) ex.splice(oi,0,"EMI"); else ex.push("EMI"); oi=ex.indexOf("Other"); } if(ex.indexOf("Investments")<0){ if(oi>=0) ex.splice(oi,0,"Investments"); else ex.push("Investments"); } setData(nd); reconcileAuto(); ui.unlocked=true; commit(); alert("Backup restored."); }catch(_){ alert("That file isn't a valid Ledger backup."); } };
    r.readAsText(f); }
});

app.addEventListener("change", function(e){
  if(e.target && e.target.id==="chatFile"){ var f=e.target.files[0]; e.target.value=""; if(!f) return;
    if(f.size > 1500000){ alert("That file is too large. Please attach files under 1.5 MB (they're stored on this device)."); return; }
    var r=new FileReader(); r.onload=function(){ ui.chatAttach={ name:f.name, type:f.type||"application/octet-stream", size:f.size, data:r.result }; render(); }; r.readAsDataURL(f);
  }
});
function download(content,filename,mime){
  var blob=new Blob([content],{type:mime}), url=URL.createObjectURL(blob), a=document.createElement("a");
  a.href=url; a.download=filename; document.body.appendChild(a); a.click(); a.remove();
  setTimeout(function(){ URL.revokeObjectURL(url); },1000);
}

/* ---- Task alarms ---- */
var _audioCtx=null;
function ensureNotifyPermission(){ try{ if(window.Notification && Notification.permission==="default") Notification.requestPermission(); }catch(e){} }
function beep(){ try{ if(!_audioCtx) _audioCtx=new (window.AudioContext||window.webkitAudioContext)(); var ctx=_audioCtx; if(ctx.state==="suspended") ctx.resume();
  [0,0.45,0.9].forEach(function(t){ var o=ctx.createOscillator(), g=ctx.createGain(); o.type="sine"; o.frequency.value=880; o.connect(g); g.connect(ctx.destination); var s=ctx.currentTime+t; g.gain.setValueAtTime(0.0001,s); g.gain.exponentialRampToValueAtTime(0.35,s+0.02); g.gain.exponentialRampToValueAtTime(0.0001,s+0.38); o.start(s); o.stop(s+0.4); }); }catch(e){} }
function showAlarmBanner(td){
  var ex=document.getElementById("alarmBanner"); if(ex) ex.remove();
  var b=document.createElement("div"); b.id="alarmBanner"; b.className="alarmbanner";
  b.innerHTML='<span style="font-size:24px">\u23F0</span><div style="flex:1"><div style="font-weight:600;font-size:14.5px">'+esc(td.title)+'</div><div style="font-size:12px;opacity:.85">Task reminder</div></div>';
  var btn=document.createElement("button"); btn.textContent="Dismiss"; btn.className="alarmdismiss"; btn.onclick=function(){ b.remove(); };
  b.appendChild(btn); document.body.appendChild(b);
  setTimeout(function(){ if(b.parentNode) b.remove(); }, 30000);
}
function fireAlarm(td){
  if(!data || !data.settings || data.settings.alarmSound!==false) beep();
  if(!data || !data.settings || data.settings.notify!==false){ try{ if(window.Notification && Notification.permission==="granted"){ new Notification("\u23F0 "+td.title, { body:"Task reminder"+(td.time?(" \u00B7 "+td.time):""), tag:td.id }); } }catch(e){} }
  showAlarmBanner(td);
}
function checkAlarms(){
  if(!db.currentId || !data || !data.todos) return;
  var now=Date.now(), changed=false;
  data.todos.forEach(function(td){
    if(td.done || td.alarmed || !td.due || !td.time) return;
    var dt=new Date(td.due+"T"+td.time).getTime(); if(isNaN(dt)) return;
    if(now>=dt){ td.alarmed=true; changed=true; if(now-dt <= 15*60*1000) fireAlarm(td); }
  });
  if(changed) save();
}

/* boot */
load();
render();
document.addEventListener("click", function _unlock(){ try{ if(!_audioCtx) _audioCtx=new (window.AudioContext||window.webkitAudioContext)(); if(_audioCtx.state==="suspended") _audioCtx.resume(); }catch(e){} document.removeEventListener("click",_unlock); }, true);
try{ checkAlarms(); setInterval(checkAlarms, 20000); }catch(e){}
</script>
